name: Update Player Mapping

on:
  schedule:
    # Monthly, 1st at 6am ET — plus a deliberate run after September
    # roster cutdowns (the 4th falls right after cut day most years).
    - cron: '0 10 1 * *'
  workflow_dispatch:              # Manual trigger option

jobs:
  update-player-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Regenerate player mapping (Sleeper <-> ESPN)
        run: node scripts/update-player-mapping.js
        env:
          TZ: 'America/New_York'

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mappings/player-mapping.json mappings/unmatched-report.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "Regenerate player mapping - $(date)"
            git pull --rebase origin main
            git push
          fi
